# Sveltia CMS configuration for zvb.bg
# Docs: https://sveltiacms.app/
#
# Admin UI: English. Content (what ends up on zvb.bg) is edited in Bulgarian.
#
# Deployment notes:
# 1. Set `backend.repo` to `<github-user>/<repo-name>` after the repo is renamed/forked.
# 2. Deploy the Sveltia OAuth worker from https://github.com/sveltia/sveltia-cms-auth
#    to Cloudflare Workers, then set `backend.base_url` to that worker URL.
# 3. For local development, run `pnpm dev` and the admin is available at /admin/ with
#    `local_backend: true` enabled below (uses `npx @sveltia/cms-proxy-server` bridge).

backend:
  name: github
  repo: AHDesign26/zvb
  branch: main
  base_url: https://sveltia-cms-auth.hamiddarabi.workers.dev
  commit_messages:
    create: 'Create {{collection}} "{{slug}}"'
    update: 'Update {{collection}} "{{slug}}"'
    delete: 'Delete {{collection}} "{{slug}}"'
    uploadMedia: 'Upload "{{path}}"'
    deleteMedia: 'Delete "{{path}}"'

# Enable for local dev: runs Sveltia against local files via the proxy server
local_backend: true

# Force admin UI language to English regardless of the editor's browser locale.
locale: en

# editorial_workflow routes every edit through a PR so the branch
# ruleset on main (Require PR, Require linear history) is satisfied.
# The client clicks "Publish" in the CMS to merge the generated PR.
publish_mode: editorial_workflow
media_folder: public/media
public_folder: /media
site_url: https://zvb.bg
display_url: https://zvb.bg
logo_url: /media/logo.png

collections:
  # ───────── Singletons (one file per page) ─────────
  - name: site
    label: Site settings
    label_singular: Setting
    description: Global settings — navigation, footer, contact info.
    files:
      - name: site
        label: Site
        file: src/content/site.json
        format: json
        fields:
          - { name: company, label: Company name, widget: string }
          - { name: tagline, label: Tagline, widget: string }
          - { name: description, label: Short description, widget: text }
          - { name: logo, label: Logo (nav), widget: image }
          - { name: logoFooter, label: Logo (footer), widget: image }
          - { name: phone, label: Phone (displayed), widget: string }
          - { name: phoneHref, label: "Phone (tel: link)", widget: string }
          - { name: emails, label: Emails, widget: list, field: { name: email, widget: string, label: Email } }
          - { name: address, label: Address, widget: string }
          - { name: catalogUrl, label: Catalog URL, widget: string }
          - { name: qrCode, label: QR code image, widget: image }
          - name: ctaLabel
            label: CTA label (request-quote button)
            widget: string
          - { name: ctaHref, label: CTA link, widget: string }
          - name: nav
            label: Navigation
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: href, label: Link, widget: string }
          - name: footer
            label: Footer
            widget: object
            fields:
              - { name: expertiseTitle, label: "Expertise heading", widget: string }
              - { name: expertise, label: Expertise list, widget: list, field: { name: item, widget: string, label: Service } }
              - { name: resourcesTitle, label: "Resources heading", widget: string }
              - name: resources
                label: Resources
                widget: list
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: href, label: Link, widget: string }
              - { name: newsletterTitle, label: Newsletter heading, widget: string }
              - { name: newsletterDescription, label: Newsletter description, widget: text }
              - { name: newsletterPlaceholder, label: Email placeholder, widget: string }
              - { name: qrLabel, label: QR code caption, widget: string }
              - { name: copyright, label: Copyright, widget: string }
              - name: legal
                label: Legal links
                widget: list
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: href, label: Link, widget: string }
              - name: credit
                label: Developer credit
                widget: object
                fields:
                  - { name: text, label: Text before link, widget: string }
                  - { name: linkText, label: Link text, widget: string }
                  - { name: linkUrl, label: URL, widget: string }

  - name: pages
    label: Pages
    label_singular: Page
    description: Content for Home, About, Gallery, and Request pages.
    files:
      - name: home
        label: Home page
        file: src/content/pages/home.json
        format: json
        fields:
          - name: meta
            label: Meta
            widget: object
            fields:
              - { name: title, label: Browser title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - name: hero
            label: Hero section
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: titleLine1, label: Title (line 1), widget: string }
              - { name: titleLine2, label: Title (line 2 — accent), widget: string }
              - { name: description, label: Description, widget: text }
              - { name: image, label: Background image, widget: image }
              - { name: badges, label: Badge labels, widget: list, field: { name: badge, widget: string, label: Badge } }
              - name: ctaPrimary
                label: Primary CTA
                widget: object
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: href, label: Link, widget: string }
              - name: ctaSecondary
                label: Secondary CTA
                widget: object
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: href, label: Link, widget: string }
              - name: metric
                label: Metric
                widget: object
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: value, label: Value, widget: string }
                  - { name: description, label: Description, widget: string }
          - name: services
            label: "\"Services\" section"
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - name: items
                label: Services (cards)
                widget: list
                fields:
                  - { name: icon, label: Material icon name, widget: string, hint: "Examples: electric_bolt, videocam, lan" }
                  - { name: title, label: Title, widget: string }
                  - { name: variant, label: Variant, widget: select, options: ["default", "accent"], default: "default" }
          - name: about
            label: "\"About\" section"
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - name: points
                label: Points
                widget: list
                fields:
                  - { name: icon, label: Material icon, widget: string }
                  - { name: title, label: Text, widget: string }
              - { name: catalogLabel, label: Catalog button label, widget: string }
              - { name: image, label: Image, widget: image }
              - name: metric
                label: Metric
                widget: object
                fields:
                  - { name: value, label: Value, widget: string }
                  - { name: description, label: Description, widget: string }
          - name: process
            label: "\"Process\" section"
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - name: steps
                label: Steps
                widget: list
                fields:
                  - { name: number, label: Number, widget: string }
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
          - name: cta
            label: CTA section
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: badges, label: Badges, widget: list, field: { name: badge, widget: string, label: Badge } }
              - { name: callLabel, label: "Button: Call", widget: string }
              - { name: quoteLabel, label: "Button: Request quote", widget: string }
          - name: installations
            label: "\"Installations\" section"
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: seeMoreLabel, label: "\"See more\" label", widget: string }
              - name: items
                label: Cards
                widget: list
                fields:
                  - { name: category, label: Category, widget: string }
                  - { name: title, label: Title, widget: string }
                  - { name: image, label: Image, widget: image }
                  - { name: size, label: Size, widget: select, options: ["large", "small"], default: "small" }
              - { name: catalogLabel, label: Catalog label, widget: string }
          - name: contact
            label: "\"Contact\" section"
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: badges, label: Badges, widget: list, field: { name: badge, widget: string, label: Badge } }
              - name: channels
                label: Channels
                widget: list
                fields:
                  - { name: icon, label: Material icon, widget: string }
                  - { name: label, label: Label, widget: string }
                  - { name: value, label: Value, widget: string }
              - name: form
                label: Form fields
                widget: object
                fields:
                  - { name: nameLabel, label: "Label: Name", widget: string }
                  - { name: namePlaceholder, label: "Placeholder: Name", widget: string }
                  - { name: emailLabel, label: "Label: Email", widget: string }
                  - { name: emailPlaceholder, label: "Placeholder: Email", widget: string }
                  - { name: interestLabel, label: "Label: Interest", widget: string }
                  - { name: interestOptions, label: Service options, widget: list, field: { name: option, widget: string, label: Option } }
                  - { name: messageLabel, label: "Label: Message", widget: string }
                  - { name: messagePlaceholder, label: "Placeholder: Message", widget: string }
                  - { name: submitLabel, label: Submit button label, widget: string }
                  - { name: statusSuccess, label: "Status: Success", widget: text }
                  - { name: statusError, label: "Status: Error", widget: text }
                  - { name: statusCaptcha, label: "Status: Captcha failed", widget: text }
                  - { name: statusRateLimited, label: "Status: Rate-limited", widget: text }
                  - { name: statusValidation, label: "Status: Validation failed", widget: text }

      - name: about
        label: "\"About us\" page"
        file: src/content/pages/about.json
        format: json
        fields:
          - name: meta
            label: Meta
            widget: object
            fields:
              - { name: title, label: Browser title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: breadcrumbHome, label: "Breadcrumb: Home", widget: string }
              - { name: breadcrumbCurrent, label: "Breadcrumb: Current", widget: string }
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: titleLine1, label: Title (line 1), widget: string }
              - { name: titleLine2, label: Title (line 2), widget: string }
              - { name: description, label: Description, widget: text }
              - { name: image, label: Background image, widget: image }
          - name: description
            label: "\"Description\" section"
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: "Title (use \\n for a line break)", widget: text }
              - { name: paragraphs, label: Paragraphs, widget: list, field: { name: p, label: Paragraph, widget: text } }
              - name: imageOne
                label: First image
                widget: object
                fields:
                  - { name: src, label: Image, widget: image }
                  - { name: alt, label: Alt text, widget: string }
                  - { name: metricValue, label: Metric value, widget: string }
                  - { name: metricLabel, label: Metric label, widget: string }
              - name: imageTwo
                label: Second image
                widget: object
                fields:
                  - { name: src, label: Image, widget: image }
                  - { name: alt, label: Alt text, widget: string }
                  - { name: metricValue, label: Metric value, widget: string }
                  - { name: metricLabel, label: Metric label, widget: string }
              - name: highlights
                label: Highlights
                widget: list
                fields:
                  - { name: icon, label: Material icon, widget: string }
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
          - name: stats
            label: Stats
            widget: list
            fields:
              - { name: value, label: Value, widget: string }
              - { name: label, label: Label, widget: string }
          - name: values
            label: "\"Values\" section"
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - name: items
                label: Values
                widget: list
                fields:
                  - { name: icon, label: Material icon, widget: string }
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
          - name: works
            label: "\"Works\" section"
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - name: slides
                label: Slides
                widget: list
                fields:
                  - { name: category, label: Category, widget: string }
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: image, label: Image, widget: image }
          - name: cta
            label: CTA
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: badges, label: Badges, widget: list, field: { name: badge, widget: string, label: Badge } }
              - { name: callLabel, label: "Button: Call", widget: string }
              - { name: quoteLabel, label: "Button: Request", widget: string }
          - name: team
            label: Team
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - name: members
                label: Members
                widget: list
                fields:
                  - { name: name, label: Name, widget: string }
                  - { name: role, label: Role, widget: string }
                  - { name: photo, label: Photo, widget: image }
                  - { name: bio, label: Bio, widget: text }
          - name: testimonials
            label: Testimonials
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - name: items
                label: Testimonials
                widget: list
                fields:
                  - { name: quote, label: Quote, widget: text }
                  - { name: author, label: Author, widget: string }
                  - { name: role, label: Role, widget: string }

      - name: gallery
        label: "\"Gallery\" page"
        file: src/content/pages/gallery.json
        format: json
        fields:
          - name: meta
            label: Meta
            widget: object
            fields:
              - { name: title, label: Browser title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: image, label: Background image, widget: image }
          - name: filters
            label: Filters
            widget: list
            fields:
              - { name: key, label: Key, widget: string, hint: "Matches the project's category" }
              - { name: label, label: Label, widget: string }
              - { name: icon, label: Material icon, widget: string }
          - { name: emptyStateText, label: Empty-state text, widget: string }

      - name: request
        label: "\"Request\" page"
        file: src/content/pages/request.json
        format: json
        fields:
          - name: meta
            label: Meta
            widget: object
            fields:
              - { name: title, label: Browser title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: title, label: Title, widget: string }
          - { name: description, label: Description, widget: text }
          - name: form
            label: Form fields
            widget: object
            fields:
              - { name: nameLabel, label: "Label: Name", widget: string }
              - { name: namePlaceholder, label: "Placeholder: Name", widget: string }
              - { name: companyLabel, label: "Label: Company", widget: string }
              - { name: companyPlaceholder, label: "Placeholder: Company", widget: string }
              - { name: emailLabel, label: "Label: Email", widget: string }
              - { name: emailPlaceholder, label: "Placeholder: Email", widget: string }
              - { name: phoneLabel, label: "Label: Phone", widget: string }
              - { name: phonePlaceholder, label: "Placeholder: Phone", widget: string }
              - { name: projectTypeLabel, label: "Label: Project type", widget: string }
              - { name: projectTypePlaceholder, label: "Placeholder: Project type", widget: string }
              - { name: projectTypes, label: Project-type options, widget: list, field: { name: opt, widget: string, label: Option } }
              - { name: detailsLabel, label: "Label: Details", widget: string }
              - { name: detailsPlaceholder, label: "Placeholder: Details", widget: string }
              - { name: submitLabel, label: Submit button label, widget: string }
              - { name: statusSuccess, label: "Status: Success", widget: text }
              - { name: statusError, label: "Status: Error", widget: text }
              - { name: statusCaptcha, label: "Status: Captcha failed", widget: text }
              - { name: statusRateLimited, label: "Status: Rate-limited", widget: text }
              - { name: statusValidation, label: "Status: Validation failed", widget: text }
          - { name: footerNote, label: Footer note, widget: string }
          - { name: footerNoteHighlight, label: Highlighted part, widget: string }

  # ───────── Projects collection (gallery items) ─────────
  - name: projects
    label: Projects (gallery)
    label_singular: Project
    folder: src/content/projects
    format: json
    extension: json
    identifier_field: title
    create: true
    delete: true
    slug: '{{order}}-{{slug}}'
    summary: '{{order}}. {{title}} — {{categoryLabel}}'
    sortable_fields: [order, title, category]
    fields:
      - { name: title, label: Title, widget: string }
      - name: category
        label: Category (key)
        widget: select
        options:
          - { label: Electrical engineering, value: electrical }
          - { label: Security & CCTV, value: cctv }
          - { label: IT infrastructure, value: it }
          - { label: Solar systems, value: solar }
          - { label: Smart home, value: smarthome }
          - { label: Lighting, value: lighting }
      - { name: categoryLabel, label: Category (displayed on site), widget: string }
      - { name: image, label: Image, widget: image }
      - { name: order, label: Order, widget: number, value_type: int, default: 0, min: 0 }
